<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 32 32" fill="none" style="image-rendering:pixelated">
  <!-- BOW ring top/bottom walls -->
  <rect x="2" y="9" width="7" height="2" fill="#ffec27"/>
  <rect x="2" y="19" width="7" height="2" fill="#ffa300"/>
  <!-- BOW ring left/right walls -->
  <rect x="1" y="11" width="2" height="8" fill="#ffec27"/>
  <rect x="9" y="11" width="2" height="8" fill="#ffec27"/>
  <!-- Ring corner joints -->
  <rect x="2" y="10" width="1" height="1" fill="#ffec27"/>
  <rect x="8" y="10" width="1" height="1" fill="#ffec27"/>
  <rect x="2" y="19" width="1" height="1" fill="#ffa300"/>
  <rect x="8" y="19" width="1" height="1" fill="#ffa300"/>

  <!-- BLADE (shaft) connecting ring to tip -->
  <rect x="10" y="12" width="18" height="4" fill="#ffec27"/>
  <!-- Blade bottom shadow -->
  <rect x="10" y="16" width="18" height="1" fill="#ffa300"/>

  <!-- TIP (right end cap) -->
  <rect x="28" y="11" width="2" height="6" fill="#ffa300"/>

  <!-- TEETH (cuts going down from blade) -->
  <rect x="13" y="17" width="2" height="4" fill="#ffec27"/>
  <rect x="18" y="17" width="2" height="3" fill="#ffec27"/>
  <rect x="23" y="17" width="2" height="5" fill="#ffec27"/>
  <!-- Teeth shadows -->
  <rect x="13" y="21" width="2" height="1" fill="#ffa300"/>
  <rect x="18" y="20" width="2" height="1" fill="#ffa300"/>
  <rect x="23" y="22" width="2" height="1" fill="#ffa300"/>
</svg>
