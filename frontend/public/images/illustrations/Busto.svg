<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 32 32" fill="none" style="image-rendering:pixelated">
  <!-- HEAD -->
  <rect x="11" y="2" width="10" height="10" fill="#ffffff"/>
  <!-- Eyes -->
  <rect x="13" y="5" width="2" height="3" fill="#5f574f"/>
  <rect x="17" y="5" width="2" height="3" fill="#5f574f"/>
  <!-- Nose -->
  <rect x="15" y="9" width="2" height="1" fill="#5f574f"/>
  <!-- Head bottom shadow -->
  <rect x="11" y="11" width="10" height="1" fill="#c2c3c7"/>
  <!-- Head highlight -->
  <rect x="20" y="3" width="1" height="4" fill="#c2c3c7"/>

  <!-- NECK -->
  <rect x="14" y="12" width="4" height="3" fill="#c2c3c7"/>

  <!-- SHOULDERS + UPPER TORSO -->
  <rect x="7" y="15" width="18" height="8" fill="#c2c3c7"/>
  <!-- Chest detail -->
  <rect x="11" y="18" width="10" height="1" fill="#5f574f"/>
  <!-- Shoulder highlight -->
  <rect x="24" y="15" width="1" height="4" fill="#ffffff"/>
  <!-- Left shoulder highlight -->
  <rect x="7" y="15" width="1" height="4" fill="#ffffff"/>

  <!-- PEDESTAL STEM -->
  <rect x="13" y="23" width="6" height="3" fill="#5f574f"/>

  <!-- PEDESTAL BASE -->
  <rect x="7" y="26" width="18" height="5" fill="#5f574f"/>
  <!-- Base top highlight -->
  <rect x="8" y="26" width="16" height="1" fill="#c2c3c7"/>
  <!-- Base bottom shadow -->
  <rect x="7" y="30" width="18" height="1" fill="#1d2b53"/>
</svg>
