<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 32 32" fill="none" style="image-rendering:pixelated">
  <!-- HEAD -->
  <rect x="12" y="2" width="8" height="7" fill="#c2c3c7"/>
  <!-- Eyes -->
  <rect x="13" y="4" width="2" height="2" fill="#5f574f"/>
  <rect x="17" y="4" width="2" height="2" fill="#5f574f"/>
  <!-- Mouth -->
  <rect x="13" y="7" width="6" height="1" fill="#5f574f"/>
  <!-- Head highlight -->
  <rect x="19" y="2" width="1" height="3" fill="#ffffff"/>

  <!-- NECK -->
  <rect x="14" y="9" width="4" height="3" fill="#c2c3c7"/>

  <!-- LEFT ARM -->
  <rect x="8" y="12" width="3" height="9" fill="#c2c3c7"/>
  <!-- Left hand/fist -->
  <rect x="7" y="21" width="4" height="3" fill="#c2c3c7"/>

  <!-- TORSO -->
  <rect x="11" y="12" width="10" height="9" fill="#c2c3c7"/>
  <!-- Chest detail -->
  <rect x="14" y="14" width="4" height="1" fill="#5f574f"/>
  <!-- Belt line -->
  <rect x="11" y="18" width="10" height="1" fill="#5f574f"/>
  <!-- Torso highlight -->
  <rect x="20" y="12" width="1" height="6" fill="#ffffff"/>

  <!-- RIGHT ARM -->
  <rect x="21" y="12" width="3" height="9" fill="#c2c3c7"/>
  <!-- Right hand/fist -->
  <rect x="21" y="21" width="4" height="3" fill="#c2c3c7"/>

  <!-- HIPS -->
  <rect x="11" y="21" width="10" height="3" fill="#c2c3c7"/>

  <!-- LEFT LEG -->
  <rect x="11" y="24" width="4" height="6" fill="#1d2b53"/>
  <!-- Left foot -->
  <rect x="10" y="30" width="5" height="2" fill="#5f574f"/>

  <!-- RIGHT LEG -->
  <rect x="17" y="24" width="4" height="6" fill="#1d2b53"/>
  <!-- Right foot -->
  <rect x="17" y="30" width="5" height="2" fill="#5f574f"/>
</svg>
