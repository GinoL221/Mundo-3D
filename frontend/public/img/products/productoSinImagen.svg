<svg width="64" height="64" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" style="image-rendering: pixelated;">
  <!-- Cara Superior del Cubo Isométrico (PICO-8 Naranja: #ffa300) -->
