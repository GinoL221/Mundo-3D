# SDD Configuration — mundo-3d
# Generated by sdd-init
schema: spec-driven

project:
  name: mundo-3d
  description: >
    E-commerce specializing in 3D-printed personalized products. Customers can
    explore, design, and acquire decorative elements and functional prototypes,
    choosing designs, colors, and materials.
  repository: https://github.com/Grupo-7-DH/Mundo-3D

stack:
  language: JavaScript + TypeScript (mixed, migrating to TS)
  runtime: node (>=22.12.0)
  backend_framework: Express.js 4.x
  frontend_framework: Astro 6.x
  orm: Sequelize 6.x
  database: MySQL (mysql2 driver)
  auth: JWT (jsonwebtoken) + bcryptjs + express-session
  logging: Pino (pino-pretty for dev)
  security: Helmet, CORS, CSRF, express-rate-limit
  file_upload: multer
  validation: express-validator
  state_management: Nanostores (frontend)
  package_manager: npm

architecture:
  style: Hexagonal / Clean Architecture
  layers:
    domain:
      entities: backend/src/domain/entities/        # Product, User, Category, Franchise, ShoppingCart, RememberToken
      ports: backend/src/domain/ports/              # IRepository interfaces, IPasswordHasher, ITokenHasher
      exceptions: backend/src/domain/exceptions/    # Domain-specific exceptions
    application:
      use_cases: backend/src/application/use-cases/ # 16 use cases
      dtos: backend/src/application/dtos/           # DTOs per aggregate
    infrastructure:
      controllers: backend/src/infrastructure/controllers/  # API controllers
      repositories: backend/src/infrastructure/repositories/ # Sequelize implementations
      routes: backend/src/infrastructure/routes/api/        # Express routers
      middlewares: backend/src/infrastructure/middlewares/  # auth, csrf, validators, etc.
      security: backend/src/infrastructure/security/        # Bcrypt, Sha256 adapters
      logging: backend/src/infrastructure/logging/          # Pino logger
    database:
      models: backend/src/database/models/          # Sequelize model definitions
      config: backend/src/database/config/
      seeds: backend/src/database/seed.js
    frontend:
      framework: Astro 6.x
      components: frontend/src/components/
      pages: frontend/src/pages/
      layouts: frontend/src/layouts/
      store: frontend/src/store/
      styles: frontend/src/styles/

structure:
  entrypoint: backend/index.js
  app: backend/src/app.js
  types: backend/src/types/

conventions:
  module_system_backend: CommonJS (require/module.exports) with TS modules via ts-node
  module_system_frontend: ESM (import/export)
  entity_pattern: TypeScript classes in domain/entities
  port_pattern: TypeScript interfaces in domain/ports (I-prefix)
  repository_pattern: Sequelize implementations of port interfaces
  use_case_pattern: One class per file, named *UseCase.ts
  controller_pattern: One class per aggregate, named *ApiController.ts
  routing: Express Router modules in infrastructure/routes/api/
  auth: JWT-based API auth + session-based for legacy routes
  css_framework: Custom CSS design system

testing:
  strict_tdd: true
  runner: Jest 30.x
  coverage_tool: Jest built-in
  test_command: "npm test"
  test_layers:
    - unit: domain entities, use cases, DTOs
    - integration: repositories (Sequelize), controllers, middlewares
    - e2e: API routes via supertest
  test_count: 50 test files
  coverage_threshold:
    branches: 50
    functions: 50
    lines: 50
    statements: 50
  transform:
    js: babel-jest
    ts: ts-jest (isolatedModules)
  test_match:
    - "**/src/**/*.test.js"
    - "**/src/**/*.test.ts"

quality:
  linter: ESLint 10.x (flat config)
  formatter: "Prettier 3.x (singleQuote, trailingComma: all, printWidth: 100)"
  type_checker: TypeScript 6.x (strict mode, target ES2022)
  ci: GitHub Actions (lint + test on Node 22)

persistence:
  mode: hybrid
  store: openspec/

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow hexagonal architecture layer boundaries
    - Domain entities MUST NOT import from infrastructure
    - Use cases depend on ports (interfaces), not concrete implementations
    - TDD enabled, test_command = npm test
  verify:
    - test_command = npm test
    - coverage_threshold = 50
  archive:
    - Warn before merging destructive deltas
