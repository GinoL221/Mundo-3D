# SDD Configuration — mundo-3d
# Generated by sdd-init
schema: spec-driven

project:
  name: mundo-3d
  description: >
    E-commerce specializing in 3D-printed personalized products. Customers can
    explore, design, and acquire decorative elements and functional prototypes,
    choosing designs, colors, and materials.
  repository: https://github.com/Grupo-7-DH/Mundo-3D

stack:
  language: JavaScript (Node.js)
  runtime: node
  framework: Express.js 4.x
  orm: Sequelize 6.x
  database: MySQL (mysql2 driver)
  template_engine: EJS
  package_manager: npm

structure:
  entrypoint: index.js
  app: src/app.js
  routes: src/routes/
  controllers: src/controllers/
  models: src/database/models/
  views: src/views/
  middleware: src/middlewares/
  public: public/
  seed: src/database/seed.js
  config: src/database/config/

conventions:
  module_system: CommonJS (require/module.exports)
  model_pattern: Sequelize define function exported as factory (sequelize) => Model
  routing: Express Router modules
  views: EJS templates organized by domain (users/, products/, partials/)
  css_framework: None detected (custom/inline)
  auth: express-session + bcryptjs + cookie-parser
  file_upload: multer
  validation: express-validator
  logging: morgan

testing:
  strict_tdd: true
  runner: Jest
  coverage_tool: Jest
  test_command: "npm test"
  status: |
    Jest is configured in package.json with scripts.test='jest'.
    There are 5 test suites in the codebase.
    Strict TDD is enabled.

persistence:
  mode: hybrid
  store: openspec/

context: |
  Tech stack: JavaScript/Express/Sequelize/EJS
  Architecture: MVC (controllers, routes, views, database/models)
  Testing: Jest (5 test suites)
  Style: ESLint & Prettier

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: true
    test_command: "npm test"
  verify:
    test_command: "npm test"
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas